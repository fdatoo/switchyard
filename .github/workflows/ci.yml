name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      switchyard: ${{ steps.filter.outputs.switchyard }}
      driverkit: ${{ steps.filter.outputs.driverkit }}
      fuzz_eventstore: ${{ steps.filter.outputs.fuzz_eventstore }}
      fuzz_registry: ${{ steps.filter.outputs.fuzz_registry }}
      fuzz_carport: ${{ steps.filter.outputs.fuzz_carport }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            switchyard:
              - '.github/workflows/ci.yml'
              - 'cmd/**'
              - 'gen/**'
              - 'internal/**'
              - 'proto/**'
              - 'scripts/**'
              - 'web/**'
              - 'testdata/**'
              - 'examples/**'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'Taskfile.yml'
            driverkit:
              - 'switchyard-driverkit/**'
              - 'go.work'
              - 'go.work.sum'
            fuzz_eventstore:
              - '.github/workflows/ci.yml'
              - 'internal/eventstore/**'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'Taskfile.yml'
            fuzz_registry:
              - '.github/workflows/ci.yml'
              - 'internal/registry/**'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'Taskfile.yml'
            fuzz_carport:
              - '.github/workflows/ci.yml'
              - 'internal/carport/**'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'Taskfile.yml'

  # ── switchyard ──────────────────────────────────────────────────────────────────

  switchyard-build-and-test:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.switchyard == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-go-grpc
        run: go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - name: Install Pkl
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) asset=pkl-linux-amd64 ;;
            macos-latest)  asset=pkl-macos-aarch64 ;;
            *) echo "unsupported os ${{ matrix.os }}" >&2; exit 1 ;;
          esac
          sudo curl -fsSL -o /usr/local/bin/pkl "https://github.com/apple/pkl/releases/download/0.31.1/$asset"
          sudo chmod +x /usr/local/bin/pkl
          pkl --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Regenerate proto (verify committed in sync)
        run: |
          PATH="$PATH:$(go env GOPATH)/bin" buf generate
          git diff --exit-code gen/

      - name: Tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Build
        run: task build

      - name: Test
        run: task test

      - name: Race
        run: task test:race

      - name: Integration
        run: task test:integration

  switchyard-lint:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.switchyard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build web frontend (required for embed.go)
        run: npm ci --prefix web && npm run build --prefix web
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  switchyard-coverage:
    name: switchyard-coverage (${{ matrix.package }})
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.switchyard == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: eventstore
            path: ./internal/eventstore
            coverpkg: ./internal/eventstore/...
            profile: cover-eventstore.out
            # TODO(F-292): Raise this temporary floor to 85% after https://linear.app/fdatoo/issue/F-292 ships.
            gate: "82.6"
            target: "85"
            exception: F-292
          - package: state
            path: ./internal/state
            coverpkg: ./internal/state/...
            profile: cover-state.out
            # TODO(F-293): Raise this temporary floor to 85% after https://linear.app/fdatoo/issue/F-293 ships.
            gate: "78.8"
            target: "85"
            exception: F-293
          - package: registry
            path: ./internal/registry
            coverpkg: ./internal/registry/...
            profile: cover-registry.out
            # TODO(F-294): Raise this temporary floor to 85% after https://linear.app/fdatoo/issue/F-294 ships.
            gate: "84.7"
            target: "85"
            exception: F-294
          - package: carport
            path: ./internal/carport
            coverpkg: ./internal/carport/...
            profile: cover-carport.out
            gate: "85"
            target: "85"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum
      - name: Run ${{ matrix.package }} coverage (unit + integration)
        run: |
          go test \
            -tags=integration \
            -coverpkg="${{ matrix.coverpkg }}" \
            -coverprofile="${{ matrix.profile }}" \
            "${{ matrix.path }}"
      - name: Enforce ${{ matrix.package }} coverage gate
        run: |
          pct=$(go tool cover -func="${{ matrix.profile }}" | awk '/^total:/ {print $3}' | tr -d %)
          gate="${{ matrix.gate }}"
          target="${{ matrix.target }}"

          echo "::group::${{ matrix.package }} coverage details"
          go tool cover -func="${{ matrix.profile }}"
          echo "::endgroup::"

          awk -v p="$pct" -v gate="$gate" 'BEGIN{exit !(p+0>=gate+0)}' || {
            echo "${{ matrix.package }} coverage ${pct}% below ${gate}% gate"
            exit 1
          }

          if awk -v gate="$gate" -v target="$target" 'BEGIN{exit !(gate+0<target+0)}'; then
            echo "::notice title=${{ matrix.package }} coverage temporary gate::${{ matrix.package }} is gated at ${gate}% pending ${{ matrix.exception }}; target is ${target}%."
          fi
          echo "${{ matrix.package }} coverage ${pct}% passes ≥${gate}% gate"

  switchyard-proto:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.switchyard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: bufbuild/buf-setup-action@v1
      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD^" >> "$GITHUB_OUTPUT"
          fi
      - name: Proto hygiene check
        run: ./scripts/check-proto-hygiene.sh ${{ steps.base.outputs.ref }}
      - name: Buf lint
        run: buf lint

  switchyard-fuzz-scheduled:
    needs: changes
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -fuzz=FuzzEventDecode -fuzztime=5m ./internal/eventstore
      - run: go test -fuzz=FuzzFilterMatch -fuzztime=5m ./internal/eventstore
      - run: go test -fuzz=FuzzFixtureParse -fuzztime=5m ./internal/eventstore
      - run: go test -fuzz=FuzzRegistryApply -fuzztime=5m ./internal/registry
      - run: go test -fuzz=FuzzEnvelopeDecode -fuzztime=5m ./internal/carport

  switchyard-fuzz-pr:
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      (
        needs.changes.outputs.fuzz_eventstore == 'true' ||
        needs.changes.outputs.fuzz_registry == 'true' ||
        needs.changes.outputs.fuzz_carport == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum
      - name: FuzzEventDecode smoke
        if: needs.changes.outputs.fuzz_eventstore == 'true'
        run: go test -run='^$' -fuzz=FuzzEventDecode -fuzztime=30s ./internal/eventstore
      - name: FuzzFilterMatch smoke
        if: needs.changes.outputs.fuzz_eventstore == 'true'
        run: go test -run='^$' -fuzz=FuzzFilterMatch -fuzztime=30s ./internal/eventstore
      - name: FuzzFixtureParse smoke
        if: needs.changes.outputs.fuzz_eventstore == 'true'
        run: go test -run='^$' -fuzz=FuzzFixtureParse -fuzztime=30s ./internal/eventstore
      - name: FuzzRegistryApply smoke
        if: needs.changes.outputs.fuzz_registry == 'true'
        run: go test -run='^$' -fuzz=FuzzRegistryApply -fuzztime=30s ./internal/registry
      - name: FuzzEnvelopeDecode smoke
        if: needs.changes.outputs.fuzz_carport == 'true'
        run: go test -run='^$' -fuzz=FuzzEnvelopeDecode -fuzztime=30s ./internal/carport

  # ── switchyard-driverkit ────────────────────────────────────────────────────────

  driverkit-build-and-test:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.driverkit == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: switchyard-driverkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: switchyard-driverkit/go.sum

      - name: Tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Race
        run: go test -race ./...

  driverkit-lint:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.driverkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: switchyard-driverkit
