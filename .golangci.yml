version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocritic
    - revive
    - misspell
    - unconvert
    - prealloc
    - bodyclose
    - contextcheck
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gocritic]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/fdatoo/switchyard
