version: '3'

vars:
  BIN_DIR: '{{.ROOT_DIR}}/dist'

tasks:
  default:
    deps: [build]

  proto:
    desc: Regenerate protobuf code via buf
    cmds:
      - buf generate

  gen:activity:
    desc: Regenerate Go + TS bindings for activity/v1 proto only
    cmds:
      - PATH="$(go env GOPATH)/bin:$PATH" buf generate --path proto/switchyard/activity/v1/

  app:install:
    desc: Install app npm dependencies (idempotent)
    dir: app
    cmds:
      - npm install --no-audit --no-fund

  app:build:
    desc: Build the Vue app bundle into internal/web/dist
    dir: app
    deps: [app:install]
    cmds:
      - npm run build

  app:typecheck:
    desc: Type-check app sources
    dir: app
    deps: [app:install]
    cmds:
      - npm run typecheck

  app:test:
    desc: Run app unit tests
    dir: app
    deps: [app:install]
    cmds:
      - npm test

  ui:dev:
    desc: Start Vite dev server (proxies to switchyardd)
    dir: app
    deps: [app:install]
    cmds:
      - npm run dev

  build:
    desc: Build both binaries
    deps: [app:build]
    cmds:
      - go build -o {{.BIN_DIR}}/switchyardd ./cmd/switchyardd
      - go build -o {{.BIN_DIR}}/switchyard ./cmd/switchyard

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:integration:
    desc: Run integration tests (crash-safety, real disk)
    cmds:
      - go test -tags=integration ./...

  test:fuzz:
    desc: Run fuzz targets briefly
    cmds:
      - go test -run='^$' -fuzz=FuzzEventDecode -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=FuzzFilterMatch -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=FuzzFixtureParse -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=Fuzz -fuzztime=30s ./internal/registry
      - go test -run='^$' -fuzz=FuzzEnvelopeDecode -fuzztime=30s ./internal/carport

  test:update-golden:
    desc: Rewrite golden fixtures from current behavior
    cmds:
      - go test ./... -update
      - go test -tags=integration ./cmd/switchyard -run TestCLIGoldenFixtures -update

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy
