version: '3'

vars:
  BIN_DIR: '{{.ROOT_DIR}}/dist'

tasks:
  default:
    deps: [build]

  setup:
    desc: Configure local repository hooks
    cmds:
      - git config core.hooksPath .githooks

  fmt:
    desc: Format Go sources
    cmds:
      - find cmd internal drivers switchyard-driverkit -name '*.go' -print | xargs gofmt -w

  fmt-check:
    desc: Check Go source formatting
    cmds:
      - |
        files="$(find cmd internal drivers switchyard-driverkit -name '*.go' -print)"
        unformatted="$(gofmt -l $files)"
        if [ -n "$unformatted" ]; then
          printf '%s\n' "$unformatted"
          exit 1
        fi

  proto:
    desc: Regenerate protobuf code via buf
    cmds:
      - buf generate

  proto:check:
    internal: true
    desc: Check generated protobuf code is in sync
    cmds:
      - |
        before="$(git diff -- gen)"
        PATH="$(go env GOPATH)/bin:$PATH" buf generate
        after="$(git diff -- gen)"
        if [ "$before" != "$after" ]; then
          echo "generated protobuf code changed; run task proto and keep gen/ in sync" >&2
          exit 1
        fi

  app:install:
    internal: true
    desc: Install app npm dependencies (idempotent)
    dir: app
    cmds:
      - npm install --no-audit --no-fund

  app:build:
    desc: Build the Vue app bundle into internal/web/dist
    dir: app
    deps: [app:install]
    cmds:
      - npm run build

  app:typecheck:
    desc: Type-check app sources
    dir: app
    deps: [app:install]
    cmds:
      - npm run typecheck

  app:test:
    desc: Run app unit tests
    dir: app
    deps: [app:install]
    cmds:
      - npm test

  ui:dev:
    desc: Start Vite dev server (proxies to switchyardd)
    dir: app
    deps: [app:install]
    cmds:
      - npm run dev

  build:
    desc: Build both binaries
    deps: [app:build]
    cmds:
      - go build -o {{.BIN_DIR}}/switchyardd ./cmd/switchyardd
      - go build -o {{.BIN_DIR}}/switchyard ./cmd/switchyard

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:integration:
    desc: Run integration tests (crash-safety, real disk)
    cmds:
      - go test -tags=integration ./...

  test:fuzz:
    desc: Run fuzz targets briefly
    cmds:
      - go test -run='^$' -fuzz=FuzzEventDecode -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=FuzzFilterMatch -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=FuzzFixtureParse -fuzztime=30s ./internal/eventstore
      - go test -run='^$' -fuzz=Fuzz -fuzztime=30s ./internal/registry
      - go test -run='^$' -fuzz=FuzzEnvelopeDecode -fuzztime=30s ./internal/carport

  test:update-golden:
    desc: Rewrite golden fixtures from current behavior
    cmds:
      - go test ./... -update
      - go test -tags=integration ./cmd/switchyard -run TestCLIGoldenFixtures -update

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  tidy:check:
    internal: true
    desc: Check Go module files are tidy
    cmds:
      - |
        before="$(git diff -- go.mod go.sum)"
        go mod tidy
        after="$(git diff -- go.mod go.sum)"
        if [ "$before" != "$after" ]; then
          echo "go.mod/go.sum changed after go mod tidy" >&2
          exit 1
        fi

  driverkit:build:
    internal: true
    desc: Build switchyard-driverkit
    dir: switchyard-driverkit
    cmds:
      - go build ./...

  driverkit:test:
    internal: true
    desc: Test switchyard-driverkit
    dir: switchyard-driverkit
    cmds:
      - go test ./...

  driverkit:lint:
    internal: true
    desc: Lint switchyard-driverkit
    dir: switchyard-driverkit
    cmds:
      - golangci-lint run ./...

  driverkit:tidy:check:
    internal: true
    desc: Check switchyard-driverkit module files are tidy
    dir: switchyard-driverkit
    cmds:
      - |
        before="$(git diff -- go.mod go.sum)"
        go mod tidy
        after="$(git diff -- go.mod go.sum)"
        if [ "$before" != "$after" ]; then
          echo "switchyard-driverkit/go.mod or go.sum changed after go mod tidy" >&2
          exit 1
        fi

  check:
    desc: Run the standard local verification suite
    cmds:
      - task: fmt-check
      - task: proto:check
      - task: tidy:check
      - task: driverkit:tidy:check
      - task: app:typecheck
      - task: app:test
      - task: build
      - task: test
      - task: driverkit:build
      - task: driverkit:test
      - task: lint
      - task: driverkit:lint

  check:full:
    desc: Run standard checks plus race and integration tests
    cmds:
      - task: check
      - task: test:race
      - task: test:integration
