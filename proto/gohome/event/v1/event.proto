// See docs/proto-hygiene.md for grouping conventions.

syntax = "proto3";

package gohome.event.v1;

import "gohome/entity/v1/attributes.proto";
import "gohome/event/v1/auth_event.proto";

// Payload is the on-the-wire variant union. The DB stores this marshalled
// inside the `events.payload` BLOB column; position/ts/kind/entity/source/
// correlation/cause live in dedicated columns.
message Payload {
  oneof kind {
    // 1-9: system/meta events
    SystemEvent         system              = 1;
    // 10-19: command/state plane
    StateChanged        state_changed       = 10;
    CommandIssued       command_issued      = 11;
    CommandAck          command_ack         = 12;
    // 20-29: registry plane
    EntityRegistered    entity_registered   = 20;
    EntityUnregistered  entity_unregistered = 21;
    // 30-39: driver-typed passthrough
    DriverEvent         driver_event        = 30;
    // 40-49: config plane
    ConfigApplied       config_applied      = 40;
    // 50-59: automation/script plane
    AutomationTriggered automation_triggered = 50;
    AutomationFinished  automation_finished  = 51;
    ScriptInvoked       script_invoked       = 52;
    ScriptFinished      script_finished      = 53;
    // 60-69: external ingress
    WebhookReceived    webhook_received    = 60;
    MCPEvalRequested   mcp_eval_requested  = 61;
    ConfigFileEdited   config_file_edited  = 62;
    // 70-79: registry mutations
    DeviceRenamed    device_renamed    = 70;
    DeviceReassigned device_reassigned = 71;
    // 80-89: driver control
    DriverInstanceRestarted driver_instance_restarted = 80;
    // 90-99: auth/policy plane
    AuthEvent auth_event = 90;
  }
}

message SystemEvent {
  string              kind = 1;   // "startup" | "shutdown" | ...
  map<string, string> data = 2;
}

message StateChanged {
  gohome.entity.v1.Attributes attributes = 1;
  // 2-9: identity (added v1alpha1.2 — drivers must populate)
  string                      entity_id  = 2;
}

message CommandIssued {
  string              command    = 1;
  map<string, string> parameters = 2;
}

message CommandAck {
  bool   success       = 1;
  string error_message = 2;
}

message EntityRegistered {
  // 1-9: identity & capability binding
  string                      driver_instance_id = 1;
  string                      device_id          = 2;
  string                      entity_type        = 3;
  string                      friendly_name      = 4;
  // Deprecated: typed as Attributes (state-shaped) but conceptually meant for
  // capability metadata. The daemon ignores this field — state flows over
  // StateChanged, which the driverkit re-emits at every Run start. Reserved
  // here to keep wire compatibility; do not populate.
  gohome.entity.v1.Attributes capabilities       = 5;
}

message EntityUnregistered {
  string reason = 1;
}

message DriverEvent {
  // 1-9: identity & kind
  string driver_instance_id = 1;
  string kind               = 2;   // "started" | "stopped" | "failed" | "heartbeat"
  string detail             = 3;
}

message ConfigApplied {
  // 1-9: meta / payload
  int64 applied_at_unix_ms       = 1;
  int32 driver_instances_added   = 2;
  int32 driver_instances_removed = 3;
  int32 driver_instances_changed = 4;
  int32 automations_changed      = 5;
  bool  dry_run                  = 6;
}

// Top-level enum so both AutomationFinished and ScriptFinished can reference it.
enum RunOutcome {
  OUTCOME_UNSPECIFIED    = 0;
  OUTCOME_OK             = 1;
  OUTCOME_CONDITION_FAIL = 2;   // automation-only (scripts have no conditions)
  OUTCOME_ACTION_ERROR   = 3;
  OUTCOME_LIMIT_EXCEEDED = 4;
  OUTCOME_CANCELLED      = 5;
  OUTCOME_SKIPPED        = 6;   // automation-only (scripts have no admission gate)
}

message AutomationTriggered {
  // 1-9: identity
  string automation_id           = 1;
  string correlation_id          = 2;   // UUID per run
  // 10-19: trigger info
  uint64 trigger_event_position  = 10;  // 0 for time / manual triggers
  string trigger_kind            = 11;  // "state_changed" | "event" | "time" | "manual"
  string invoked_by              = 12;  // "cli:<user>" / "api:<token>" / "" for subscribed
}

message AutomationFinished {
  // 1-9: identity
  string     automation_id  = 1;
  string     correlation_id = 2;
  // 10-19: outcome
  RunOutcome outcome        = 10;
  string     error          = 11;
  // 20-29: telemetry
  int64      elapsed_ms     = 20;
  uint64     starlark_steps = 21;
  repeated string log_lines = 22;
}

message ScriptInvoked {
  // 1-9: identity
  string              script_name    = 1;
  string              correlation_id = 2;
  // 10-19: provenance
  string              invoked_by     = 10;  // "cli:<user>" | "automation:<id>" | "api:<token>"
  map<string, string> args           = 11;
}

message ScriptFinished {
  // 1-9: identity
  string     script_name    = 1;
  string     correlation_id = 2;
  // 10-19: outcome
  RunOutcome outcome        = 10;
  string     error          = 11;
  // 20-29: telemetry
  int64      elapsed_ms     = 20;
  uint64     starlark_steps = 21;
  repeated string log_lines = 22;
  string     return_value   = 23;  // Starlark repr() of return
}

message WebhookReceived {
  // 1-9: identity
  string slug = 1;

  // 10-19: payload
  bytes               body    = 10;
  map<string, string> headers = 11;

  // 20-29: source
  string source_ip = 20;
}

message DeviceRenamed {
  // 1-9: identity
  string device_id = 1;

  // 10-19: payload
  string old_friendly_name = 10;
  string new_friendly_name = 11;
}

message DeviceReassigned {
  // 1-9: identity
  string device_id = 1;

  // 10-19: payload
  string old_area_id = 10;
  string new_area_id = 11;
}

message DriverInstanceRestarted {
  // 1-9: identity
  string driver_instance_id = 1;

  // 10-19: context
  string reason = 10;
  string actor  = 11;
}

message MCPEvalRequested {
  string principal_id      = 1;
  string session_id        = 2;
  string source            = 10;
  string result_sha256_hex = 11;
  bool   truncated         = 12;
  uint32 result_bytes      = 13;
  uint32 duration_ms       = 20;
  string error             = 21;
}

message ConfigFileEdited {
  string principal_id = 1;
  string session_id   = 2;
  string path         = 10;
  string sha256_hex   = 11;
  uint32 size_bytes   = 12;
}
