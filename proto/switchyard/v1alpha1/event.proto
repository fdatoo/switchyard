// See docs/proto-hygiene.md for grouping conventions.

syntax = "proto3";

package switchyard.v1alpha1;

import "switchyard/v1alpha1/common.proto";
import "switchyard/event/v1/event.proto";
import "google/protobuf/timestamp.proto";

service EventService {
  rpc Query(QueryEventsRequest) returns (QueryEventsResponse);
  rpc Tail (TailEventsRequest)  returns (stream TailEventsResponse);
}

message Event {
  uint64                    cursor         = 1;
  google.protobuf.Timestamp at             = 2;
  string                    kind           = 3;
  string                    entity         = 4;
  string                    source         = 5;
  string                    correlation_id = 6;
  string                    cause_id       = 7;
  switchyard.event.v1.Payload   payload        = 10;
}

message QueryEventsRequest {
  PageRequest page   = 1;
  EventFilter filter = 2;
}
message QueryEventsResponse {
  repeated Event events = 1;
  PageResponse   page   = 2;
}

message TailEventsRequest {
  EventFilter filter = 1;
}
message TailEventsResponse {
  oneof kind {
    Event     event     = 1;
    Heartbeat heartbeat = 2;
  }
}
