// See docs/proto-hygiene.md for grouping conventions.

syntax = "proto3";

package switchyard.v1alpha1;

import "google/protobuf/timestamp.proto";

service SystemService {
  rpc Version             (VersionRequest)              returns (VersionResponse);
  rpc Health              (HealthRequest)               returns (HealthResponse);
  rpc Metrics             (MetricsRequest)              returns (MetricsResponse);
  rpc Diagnostics         (DiagnosticsRequest)          returns (DiagnosticsResponse);
  rpc CreateSnapshot      (CreateSnapshotRequest)       returns (CreateSnapshotResponse);
  rpc GetConfigDir        (GetConfigDirRequest)         returns (GetConfigDirResponse);
  rpc RecordConfigFileEdit(RecordConfigFileEditRequest)  returns (RecordConfigFileEditResponse);
  rpc GetMCPConfig        (GetMCPConfigRequest)         returns (GetMCPConfigResponse);
}

// 1-9: Version
message VersionRequest {}
message VersionResponse {
  string binary_version = 1;
  string git_commit     = 2;
  string build_date     = 3;
  string schema_version = 4;
}

// 10-19: Health
message HealthRequest {}
message HealthResponse {
  // 1-9: status
  bool   ok      = 1;
  string summary = 2;

  // 10-19: per-subsystem
  repeated SubsystemHealth subsystems = 10;
}
message SubsystemHealth {
  string name    = 1;
  bool   ok      = 2;
  string detail  = 3;
}

// 20-29: Metrics
message MetricsRequest {}
message MetricsResponse {
  string prometheus_text = 1;
}

// 30-39: Diagnostics
message DiagnosticsRequest {}
message DiagnosticsResponse {
  bytes  bundle      = 1;
  string config_hash = 2;
  google.protobuf.Timestamp generated_at = 3;
}

// 40-49: Snapshot
message CreateSnapshotRequest {
  string owner  = 1;
  string reason = 2;
}
message CreateSnapshotResponse {
  uint64 cursor       = 1;
  google.protobuf.Timestamp created_at = 2;
}

// 50-59: ConfigDir
message GetConfigDirRequest {}
message GetConfigDirResponse {
  string config_dir = 1;
}

// 60-69: RecordConfigFileEdit
message RecordConfigFileEditRequest {
  string session_id = 1;
  string path       = 10;
  string sha256_hex = 11;
  uint32 size_bytes = 12;
}
message RecordConfigFileEditResponse {
  uint64 event_cursor = 1;
}

// 70-79: MCPConfig
message GetMCPConfigRequest {}
message GetMCPConfigResponse {
  uint32 eval_result_max_bytes       = 1;
  uint32 read_file_max_bytes         = 2;
  uint32 entity_subscription_buffer = 10;
  uint32 trace_subscription_buffer  = 11;
  uint32 tail_default_wait_seconds  = 20;
  uint32 tail_max_wait_seconds      = 21;
}
