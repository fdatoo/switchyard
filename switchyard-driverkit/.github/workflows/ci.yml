name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: switchyard-driverkit
      - uses: actions/checkout@v4
        with:
          repository: fdatoo/switchyard
          path: switchyard
          token: ${{ secrets.SWITCHYARD_REPO_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        working-directory: switchyard-driverkit
        run: go build ./...
      - name: Tests
        working-directory: switchyard-driverkit
        run: go test ./...
      - name: Race tests
        working-directory: switchyard-driverkit
        run: go test -race ./...
      - name: Integration tests
        working-directory: switchyard-driverkit
        run: go test -race -tags integration ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: switchyard-driverkit
      - uses: actions/checkout@v4
        with:
          repository: fdatoo/switchyard
          path: switchyard
          token: ${{ secrets.SWITCHYARD_REPO_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          working-directory: switchyard-driverkit
